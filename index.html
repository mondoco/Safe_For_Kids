<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YouTube For Kids</title>
<link rel="stylesheet" href="styles.css" />
<script src="script.js"></script>
</head>

<body>
<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" alt="YouTube" class="yt-icon">
    <span class="yt-text">YouTube</span>
  </div>
  
  <div style="flex: 1;"></div>
  
  <div class="header-icons">
    <!-- Search -->
    <svg class="search-icon" id="searchIcon" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
      <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    
    <!-- Notifications -->
    <svg class="notifications-icon" id="notificationsIcon" viewBox="0 0 24 24">
      <path d="M18 8a6 6 0 10-12 0c0 7-3 7-3 7h18s-3 0-3-7" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M13.73 21a2 2 0 01-3.46 0" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="18" cy="6" r="2" fill="#ff0000"/>
    </svg>
  </div>
</div>

<!-- Search Page (hidden) -->
<div class="search-page" id="searchPage">
  <div class="search-header">
    <svg class="back-btn" id="backBtn" viewBox="0 0 24 24">
      <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
    </svg>
    <div class="search-container-full">
      <input type="text" class="search-input-full" placeholder="بحث" id="searchInputFull">
      <svg class="mic-icon" viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 3 5.47 6.91 5.87V20h-2v2h6v-2h-2v-1.03c3.9-.4 6.41-2.87 6.91-5.87.09-.6-.39-1.14-1-1.14z"/>
      </svg>
    </div>
  </div>
  <div class="search-results" id="search-results-container">
    <!-- Results will appear here -->
    <div style="text-align: center; color: #aaa; padding: 50px 20px;">
      اكتب للبحث عن فيديوهات، قنوات، أشخاص...
    </div>
  </div>
</div>



<div id="nnc" class="categories">
  <div class="chip active" onclick="filterVideos('all', this)">الكل</div>
  <div class="chip" onclick="filterVideos('C', this)">كرتون</div>
  <div class="chip" onclick="filterVideos('E', this)">تعليمي</div> 
  <div class="chip" onclick="filterVideos('S', this)">رياضة</div>
  <div class="chip" onclick="filterVideos('I', this)">إسلامي</div>
  <div class="chip" onclick="filterVideos('CH', this)">تحديات</div>

</div>



<!-- MAIN CONTENT (clean and empty) -->
<div class="main-content">
  <div id="tabContent">
    <!-- Home Tab -->
    <div class="tab-pane active" data-tab="home">
    
      <!-- VIDEO PLAYER SECTION -->
      <div class="container">
          <!-- <div id="player-section">
              <div class="video-wrapper">
                  <iframe id="main-iframe" src="" allowfullscreen allow="autoplay"></iframe>
              </div>
              <div id="video-title"></div>
              <hr style="border: 0.5px solid #333;">
              <div style="padding-left: 15px; color: #aaa; font-size: 18px; font-weight: bold;">اقتراحات لك:</div>
          </div> -->
<div id="player-section" style="display:none;">
    <iframe id="main-iframe" width="100%" height="250" src="" frameborder="0" allowfullscreen></iframe>
    
    <div style="padding: 3px;">
        <h2 id="video-title" style="color:white; font-size:16px;"></h2>
        <div style="display:flex; align-items:center; gap:10px; margin:8px 3px;">
            <img id="player-channel-img" src="" style="width:40px; height:40px; border-radius:50%;">
            <div style="flex:1;">
                <div id="player-channel-name" style="color:white; font-weight:bold;"></div>
                <span id="player-channel-subs" style="color:#aaa; font-size:12px;"></span>
            </div>
            
            <button style="background:white; border-radius:20px; padding:5px 15px; border:none; font-weight:bold;">مشترك</button>
        </div>
<div>اقتراحات لك:</div>
        <div class="sug" style="display:flex; gap:8px; overflow-x:auto; padding-bottom:10px;">
            <div class="s-chip active" onclick="filterSuggestions('all')">الكل</div>
            <div class="s-chip" onclick="filterSuggestions('same-channel')">من القناة</div>
            <div class="s-chip" onclick="filterSuggestions('same-category')">مشابه</div>
        </div>
      </div>

      </div>
                <div id="video-list-container" class="video-grid">
          </div>
    </div>
    </div>
    <!-- Shorts Tab -->
    <div class="tab-pane" data-tab="shorts">
      <div class="container">
          <div id="player-shorts-section">
              <div class="video-wrapper">
                  <iframe id="shorts-iframe" src="" allowfullscreen allow="autoplay"></iframe>
              </div>
              <div id="short-title"></div>
              <hr style="border: 0.5px solid #333;">
              <div style="padding-left: 15px; color: #aaa; font-size: 18px; font-weight: bold;">اقتراحات لك:</div>
          </div>
          <div id="shorts-container" class="video-grid">
          </div>
      </div>
    </div>
    
    <!-- Subscriptions Tab -->
    <div class="tab-pane" data-tab="subscriptions">
      <h2>القنوات المشترك بها</h2>
      <div id="channels-list-container" class="channels-grid">
      </div>
    </div>
    
    <!-- You Tab -->
    <div class="tab-pane" data-tab="you">
      <h2>مكتبتك</h2>
      <p>سجل المشاهدة، التاريخ، إلخ</p>
    </div>
    <div id="channel-page" class="tab-pane" data-tab="channel-page" background: #0f0f0f; min-height: 100vh;">
        <div class="channel-header" style="padding: 20px; border-bottom: 1px solid #333; position: sticky; top: 0; background: #0f0f0f; z-index: 100;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button onclick="closeChannelPage()" style="background:none; border:none; color:white; font-size: 24px; cursor:pointer;-webkit-tap-highlight-color: transparent;">✕</button>
                <img id="page-channel-img" src="" style="width: 60px; height: 60px; border-radius: 50%;">
                <div style="flex: 1;">
                    <h2 id="page-channel-name" style="margin:0; font-size: 18px; color:white;"></h2>
                    <span style="color: #aaa; font-size: 13px;">محتوى آمن للطفل</span>
                </div>
            </div>
        </div>

        <div id="channel-videos-container" class="video-grid" style="padding-top: 10px;">
            </div>
    </div>
  </div>

  
</div>



<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <!-- Home (active) -->
  <div class="nav-item h active">
    <svg viewBox="0 0 24 24">
      <path d="M3 9l9-7 9 7V20a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>الرئيسية</span>
  </div>

  <!-- Shorts -->
  <div class="nav-item s" style="margin-left: 10% ;">
    <svg viewBox="0 0 24 24">
        <g transform="rotate(150 13 13)">
            <rect x="7" y="8.20" width="17" height="7" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
        </g>
        <g transform="rotate(150 13 13)">
            <rect x="3" y="15" width="17" height="7" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
        </g>
        <g transform="rotate(150 10 10)">
            <rect x="5.6" y="5" width="8.5" height="5"  fill="black"  stroke="black"/>
        </g>
        <path d="M10 9.5l4 2-4 2V10z" fill="currentColor"/>
    </svg>
    <span>شورتس</span>
  </div>

  <!-- Create -->
  <div class="nav-create">
    <svg viewBox="0 0 24 24">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </div>


  <!-- Subscriptions -->
  <div class="nav-item c" style="margin-right: 10% ;">
    <svg viewBox="0 0 24 24">
      <rect x="3" y="5" width="18" height="14" rx="3"/>
      <polygon points="10,9 15,12 10,15"/>
    </svg>
    <span>الاشتراكات</span>
  </div>

  <!-- You -->
  <div class="nav-item y">
    <svg viewBox="0 0 24 24">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
    </svg>
    <span>أنت</span>
  </div>
</div>



</body>
</html>
